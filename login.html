<!DOCTYPE html>
<html>

<head>

    <title>EcoCash Login</title>

    <style>

        body{

            font-family: Arial, sans-serif;
            background:#e8f5e9;
            text-align:center;
            margin-top:100px;

        }

        .card{

            width:320px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 15px #bdbdbd;

        }

        h1{

            color:#2e7d32;

        }

        input{

            width:90%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;

        }

        button{

            padding:10px 20px;
            border:none;
            border-radius:8px;
            background:#2e7d32;
            color:white;
            cursor:pointer;

        }

        #message{

            color:red;

        }

    </style>

</head>

<body>

<div class="card">

    <h1>EcoCash Login</h1>

    <input
    type="text"
    id="phone"
    placeholder="Phone Number">

    <input
    type="password"
    id="pin"
    placeholder="4-digit PIN">

    <button onclick="login()">

        Login

    </button>

    <p id="message"></p>

</div>

<script>

function login(){

    let phone =
    document.getElementById(
    "phone").value;

    let pin =
    document.getElementById(
    "pin").value;

    let users =
    JSON.parse(
    localStorage.getItem(
    "users")
    ) || [];

    let user =
    users.find(

    u =>

    u.phone === phone &&

    u.pin === pin

    );

    if(user){

        let otp =

        Math.floor(

        100000 +

        Math.random() *

        900000

        );

        alert(

        "Demo OTP: " +

        otp

        );

        let enteredOtp =

        prompt(

        "Enter OTP"

        );

        if(

        enteredOtp == otp

        ){

            localStorage.setItem(

            "currentUser",

            JSON.stringify(user)

            );

            window.location.href =

            "dashboard.html";

        }

        else{

            document.getElementById(

            "message"

            ).innerHTML =

            "Invalid OTP";

        }

    }

    else{

        document.getElementById(

        "message"

        ).innerHTML =

        "Wrong phone number or PIN";

    }

}

</script>

</body>

</html>
