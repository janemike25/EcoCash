<!DOCTYPE html>
<html>
<head>
    <title>EcoCash Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #00d26a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            width: 300px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #008f4c;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00b84f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #009944;
        }

        p {
            margin-top: 15px;
        }

        a {
            color: #008f4c;
            text-decoration: none;
            font-weight: bold;
        }

        #message {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Login to EcoCash</h1>

    <input type="text" id="phone" placeholder="Enter phone number">

    <input type="password" id="pin" placeholder="Enter PIN">

    <button onclick="login()">Login</button>

    <p>
        Don't have an account?
        <a href="register.html">Register</a>
    </p>

    <p id="message"></p>

</div>

<script>

function login() {

    const phone = document.getElementById("phone").value;

    const pin = document.getElementById("pin").value;

    const users = JSON.parse(localStorage.getItem("users")) || [];

    const user = users.find(
        u => u.phone === phone && u.pin === pin
    );

    if(user){

        localStorage.setItem(
            "currentUser",
            JSON.stringify(user)
        );

        window.location.href = "dashboard.html";

    }

    else{

        document.getElementById(
            "message"
        ).innerHTML =
        "Wrong phone number or PIN";

    }

}

</script>

</body>
</html>
