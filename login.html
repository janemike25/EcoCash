<!DOCTYPE html>
<html>

<head>

    <title>Wallet Login</title>

    <style>

        body{

            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:100px;
            background:#e8f5e9;

        }

        .card{

            width:320px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 15px #bdbdbd;

        }

        h1{

            color:#2e7d32;

        }

        input{

            width:90%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;

        }

        button{

            padding:10px 20px;
            border:none;
            border-radius:8px;
            background:#2e7d32;
            color:white;
            cursor:pointer;

        }

        #message{

            color:red;

        }

        a{

            text-decoration:none;

        }

    </style>

</head>

<body>

<div class="card">

    <h1>Wallet Login</h1>

    <input
        type="tel"
        id="phone"
        placeholder="Phone Number">

    <input
        type="password"
        id="pin"
        maxlength="4"
        placeholder="4-digit PIN">

    <br><br>

    <button onclick="login()">

        Login

    </button>

    <p id="message"></p>

    <p>

        Don't have an account?

        <br><br>

        <a href="register.html">

            Create Account

        </a>

    </p>

</div>

<script>

function login(){

    let phone =
    document.getElementById(
    "phone").value;

    let pin =
    document.getElementById(
    "pin").value;

    let users =
    JSON.parse(
    localStorage.getItem(
    "users")
    ) || [];

    let user =
    users.find(
    u =>
    u.phone === phone &&
    u.pin === pin
    );

    if(user){

        localStorage.setItem(

            "currentUser",

            JSON.stringify(user)

        );

        window.location.href =

        "dashboard.html";

    }

    else{

        document.getElementById(

        "message"

        ).innerHTML =

        "Wrong phone number or PIN";

    }

}

</script>

</body>

</html>
