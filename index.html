<!DOCTYPE html>
<html>
<head>
  <title>EcoCash Login</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#00c853,#1de9b6);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .container{
      background:white;
      width:300px;
      padding:30px;
      border-radius:15px;
      box-shadow:0 5px 20px rgba(0,0,0,0.3);
      text-align:center;
    }

    h1{
      color:#00a152;
      margin-bottom:20px;
    }

    input{
      width:90%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:12px;
      background:#00c853;
      color:white;
      border:none;
      border-radius:8px;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      background:#009624;
    }

    a{
      color:#00a152;
      text-decoration:none;
      font-weight:bold;
    }

    p{
      margin-top:20px;
    }
  </style>
</head>

<body>

<div class="container">

<h1>Login to EcoCash</h1>

<input type="email" placeholder="Enter email">

<input type="password" placeholder="Enter password">

<button>Login</button>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

</body>
</html>
