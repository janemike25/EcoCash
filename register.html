<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <style>

        body{

            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:100px;
            background:#e8f5e9;

        }

        .card{

            width:320px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 15px #bdbdbd;

        }

        h1{

            color:#2e7d32;

        }

        input{

            width:90%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;

        }

        button{

            padding:10px 20px;
            border:none;
            border-radius:8px;
            background:#2e7d32;
            color:white;
            cursor:pointer;

        }

        #message{

            margin-top:10px;

        }

    </style>

</head>

<body>

<div class="card">

    <h1>Create Account</h1>

    <input
        type="text"
        id="name"
        placeholder="Full Name">

    <input
        type="tel"
        id="phone"
        placeholder="Phone Number">

    <input
        type="password"
        id="pin"
        maxlength="4"
        placeholder="4-digit PIN">

    <br>

    <button onclick="register()">

        Register

    </button>

    <p id="message"></p>

</div>

<script>

function register(){

    let name =
    document.getElementById(
    "name").value;

    let phone =
    document.getElementById(
    "phone").value;

    let pin =
    document.getElementById(
    "pin").value;

    if(name=="" ||
       phone=="" ||
       pin==""){

        document.getElementById(
        "message").style.color=
        "red";

        document.getElementById(
        "message").innerHTML=

        "Please fill all fields";

        return;

    }

    let users =

    JSON.parse(

    localStorage.getItem(
    "users")

    ) || [];

    let exists =

    users.find(

    user =>

    user.phone === phone

    );

    if(exists){

        document.getElementById(
        "message").style.color=
        "red";

        document.getElementById(
        "message").innerHTML=

        "Phone number already registered";

        return;

    }

    users.push({

        name:name,

        phone:phone,

        pin:pin,

        balance:1250,

        history:[]

    });

    localStorage.setItem(

    "users",

    JSON.stringify(users)

    );

    document.getElementById(
    "message").style.color=
    "green";

    document.getElementById(
    "message").innerHTML=

    "Registration successful!";

    setTimeout(function(){

        window.location.href=

        "login.html";

    },1500);

}

</script>

</body>

</html>
