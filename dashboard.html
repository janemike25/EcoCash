<!DOCTYPE html>
<html>

<head>

    <title>Wallet Dashboard</title>

    <style>

        body{

            font-family: Arial, sans-serif;
            background:#e8f5e9;
            text-align:center;
            margin-top:40px;

        }

        .card{

            width:360px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 15px #bdbdbd;

        }

        h1{

            color:#2e7d32;

        }

        h2{

            color:#1b5e20;

        }

        input{

            width:90%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;

        }

        button{

            padding:10px 20px;
            margin:5px;
            border:none;
            border-radius:8px;
            background:#2e7d32;
            color:white;
            cursor:pointer;

        }

        button:hover{

            opacity:0.9;

        }

        ul{

            text-align:left;

        }

        #message{

            margin-top:10px;

        }

    </style>

</head>

<body>

<div class="card">

    <h1 id="welcome"></h1>

    <h2 id="balance"></h2>

    <hr>

    <h3>Deposit Money</h3>

    <input
    type="number"
    id="depositAmount"
    placeholder="Amount">

    <br>

    <button onclick="depositMoney()">

        Deposit

    </button>

    <hr>

    <h3>Transfer Money</h3>

    <input
    type="text"
    id="recipient"
    placeholder="Recipient">

    <input
    type="number"
    id="amount"
    placeholder="Amount">

    <br>

    <button onclick="transfer()">

        Transfer

    </button>

    <hr>

    <h3>Withdraw Money</h3>

    <input
    type="number"
    id="withdrawAmount"
    placeholder="Amount">

    <br>

    <button onclick="withdrawMoney()">

        Withdraw

    </button>

    <hr>

    <button onclick="logout()">

        Logout

    </button>

    <p id="message"></p>

    <hr>

    <h3>Transaction History</h3>

    <ul id="history"></ul>

</div>

<script>

let user = JSON.parse(
localStorage.getItem(
"currentUser"));

if(user){

document.getElementById(
"welcome").innerHTML =

"Welcome " + user.name;

}

else{

window.location.href =
"login.html";

}

let balance =
Number(
localStorage.getItem(
"balance")) || 1250;

let history =
JSON.parse(
localStorage.getItem(
"history")) || [];

updateBalance();

displayHistory();

function saveData(){

localStorage.setItem(
"balance",
balance);

localStorage.setItem(
"history",
JSON.stringify(history));

}

function depositMoney(){

let amount =
Number(
document.getElementById(
"depositAmount").value);

if(amount<=0){

message(
"Enter valid amount",
"red");

return;

}

balance += amount;

history.unshift(

"Deposited $" +

amount

);

saveData();

updateBalance();

displayHistory();

message(

"Deposited $" +

amount,

"green"

);

document.getElementById(
"depositAmount").value="";

}

function transfer(){

let recipient =
document.getElementById(
"recipient").value;

let amount =
Number(
document.getElementById(
"amount").value);

if(recipient=="" ||
amount<=0){

message(
"Enter recipient and amount",
"red");

return;

}

if(amount>balance){

message(
"Insufficient balance",
"red");

return;

}

balance -= amount;

history.unshift(

"Transferred $" +

amount +

" to " +

recipient

);

saveData();

updateBalance();

displayHistory();

message(

"Transferred $" +

amount +

" to " +

recipient,

"green"

);

document.getElementById(
"recipient").value="";

document.getElementById(
"amount").value="";

}

function withdrawMoney(){

let amount =
Number(
document.getElementById(
"withdrawAmount").value);

if(amount<=0){

message(
"Enter valid amount",
"red");

return;

}

if(amount>balance){

message(
"Insufficient balance",
"red");

return;

}

balance -= amount;

history.unshift(

"Withdrew $" +

amount

);

saveData();

updateBalance();

displayHistory();

message(

"Withdrew $" +

amount,

"green"

);

document.getElementById(
"withdrawAmount").value="";

}

function updateBalance(){

document.getElementById(
"balance").innerHTML =

"Balance: $" +

balance;

}

function displayHistory(){

let list =
document.getElementById(
"history");

list.innerHTML="";

history.forEach(
function(item){

let li =
document.createElement(
"li");

li.innerHTML=item;

list.appendChild(li);

});

}

function message(
text,color){

document.getElementById(
"message").style.color =
color;

document.getElementById(
"message").innerHTML =
text;

}

function logout(){

localStorage.removeItem(
"currentUser");

window.location.href =
"login.html";

}

</script>

</body>

</html>
