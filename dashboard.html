<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            margin-top: 100px;
        }

        .card {
            width: 320px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">

    <h1>Welcome Admin</h1>

    <p><b>Balance:</b> $1,250</p>

    <p><b>Transactions:</b> 15</p>

    <button onclick="logout()">Logout</button>

</div>

<script>

function logout() {

    window.location.href = "login.html";

}

</script>

</body>
</html>
