<!DOCTYPE html>
<html>

<head>

<title>EcoCash</title>

<style>

body{

font-family:Arial,sans-serif;
background:#e8f5e9;
margin:0;
padding:0;

}

.header{

background:#00a651;
color:white;
padding:20px;
text-align:center;

}

.card{

background:white;
width:90%;
max-width:400px;
margin:20px auto;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px #bdbdbd;

}

.balance{

font-size:30px;
font-weight:bold;
color:#00a651;

}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;

}

button{

padding:15px;
border:none;
border-radius:10px;
background:#00a651;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{

opacity:0.9;

}

input{

width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;

}

ul{

text-align:left;

}

</style>

</head>

<body>

<div class="header">

<h1 id="welcome"></h1>

<p id="phone"></p>

</div>

<div class="card">

<p>Wallet Balance</p>

<div
class="balance"
id="balance">

$0

</div>

</div>

<div class="card">

<div class="grid">

<button onclick="showDeposit()">

Deposit

</button>

<button onclick="showWithdraw()">

Withdraw

</button>

<button onclick="showSend()">

Send Money

</button>

<button onclick="showLoan()">

Loan

</button>

<button onclick="window.location.href='profile.html'">

Profile

</button>

<button onclick="logout()">

Logout

</button>

</div>

</div>

<div class="card" id="actions">

<h3>Welcome to EcoCash</h3>

<p>

Choose an action above.

</p>

</div>

<div class="card">

<h3>Transaction History</h3>

<ul id="history"></ul>

</div>

<script>

let currentUser =

JSON.parse(

localStorage.getItem(

"currentUser"

));

if(!currentUser){

window.location.href=

"login.html";

}

if(currentUser.balance==null)

currentUser.balance=1250;

if(currentUser.history==null)

currentUser.history=[];

if(currentUser.loan==null)

currentUser.loan=0;

document.getElementById(

"welcome"

).innerHTML=

"Welcome " +

currentUser.name;

document.getElementById(

"phone"

).innerHTML=

currentUser.phone;

update();

function update(){

document.getElementById(

"balance"

).innerHTML=

"$"+

currentUser.balance;

localStorage.setItem(

"currentUser",

JSON.stringify(

currentUser)

);

displayHistory();

}

function displayHistory(){

let list=

document.getElementById(

"history");

list.innerHTML="";

currentUser.history.forEach(

item=>{

let li=

document.createElement(

"li");

li.innerHTML=item;

list.appendChild(li);

});

}

function showDeposit(){

document.getElementById(

"actions"

).innerHTML=

`

<h3>Deposit</h3>

<input type="number"

id="dep"

placeholder="Amount">

<br>

<button onclick="deposit()">

Deposit

</button>

`;

}

function deposit(){

let a=

Number(

document.getElementById(

"dep").value);

currentUser.balance+=a;

currentUser.history.push(

"Deposited $"+a

);

update();

}

function showWithdraw(){

document.getElementById(

"actions"

).innerHTML=

`

<h3>Withdraw</h3>

<input type="number"

id="wit"

placeholder="Amount">

<br>

<button onclick="withdrawMoney()">

Withdraw

</button>

`;

}

function withdrawMoney(){

let a=

Number(

document.getElementById(

"wit").value);

if(a>

currentUser.balance){

alert(

"Insufficient balance"

);

return;

}

currentUser.balance-=a;

currentUser.history.push(

"Withdrew $"+a

);

update();

}

function showSend(){

document.getElementById(

"actions"

).innerHTML=

`

<h3>Send Money</h3>

<input type="text"

id="rec"

placeholder="Phone Number">

<input type="number"

id="amt"

placeholder="Amount">

<br>

<button onclick="sendMoney()">

Send

</button>

`;

}

function sendMoney(){

let phone=

document.getElementById(

"rec").value;

let amount=

Number(

document.getElementById(

"amt").value);

currentUser.balance-=amount;

currentUser.history.push(

"Sent $"+

amount+

" to "+

phone

);

update();

}

function showLoan(){

document.getElementById(

"actions"

).innerHTML=

`

<h3>Loan</h3>

<p>

Current Loan:

$${currentUser.loan}

</p>

<p>

Maximum Loan:

$3000

</p>

<input type="number"

id="loan"

placeholder="Amount">

<br>

<button onclick="takeLoan()">

Take Loan

</button>

`;

}

function takeLoan(){

let amount=

Number(

document.getElementById(

"loan").value);

if(

currentUser.loan+

amount>

3000){

alert(

"Loan limit exceeded"

);

return;

}

currentUser.loan+=amount;

currentUser.balance+=amount;

currentUser.history.push(

"Loan received $"+

amount

);

update();

showLoan();

}

function logout(){

localStorage.removeItem(

"currentUser"

);

window.location.href=

"login.html";

}

</script>

</body>

</html>
