<!DOCTYPE html>
<html>

<head>

    <title>EcoCash Dashboard</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            text-align:center;
            margin-top:60px;
        }

        .card{
            width:350px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px #ccc;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 20px;
            margin:5px;
            cursor:pointer;
        }

        #message{
            margin-top:10px;
        }

        ul{
            text-align:left;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>Welcome Jane</h1>

    <h2 id="balance">
        Balance: $1250
    </h2>

    <h3>Transfer Money</h3>

    <input
        type="text"
        id="recipient"
        placeholder="Recipient">

    <input
        type="number"
        id="amount"
        placeholder="Amount">

    <br>

    <button onclick="transfer()">

        Transfer

    </button>

    <button onclick="logout()">

        Logout

    </button>

    <p id="message"></p>

    <hr>

    <h3>Transaction History</h3>

    <ul id="history">

    </ul>

</div>

<script>

let balance = 1250;

let history = [];

function transfer(){

    let recipient =
    document.getElementById(
    "recipient").value;

    let amount =
    Number(
    document.getElementById(
    "amount").value);

    if(recipient === "" || amount <= 0){

        document.getElementById(
        "message").style.color =
        "red";

        document.getElementById(
        "message").innerHTML =
        "Enter recipient and amount.";

        return;

    }

    if(amount > balance){

        document.getElementById(
        "message").style.color =
        "red";

        document.getElementById(
        "message").innerHTML =
        "Insufficient balance.";

        return;

    }

    balance = balance - amount;

    document.getElementById(
    "balance").innerHTML =
    "Balance: $" + balance;

    document.getElementById(
    "message").style.color =
    "green";

    document.getElementById(
    "message").innerHTML =
    "Transferred $" +
    amount +
    " to " +
    recipient;

    history.unshift(
        "Transferred $" +
        amount +
        " to " +
        recipient
    );

    displayHistory();

    document.getElementById(
    "recipient").value = "";

    document.getElementById(
    "amount").value = "";

}

function displayHistory(){

    let list =
    document.getElementById(
    "history");

    list.innerHTML = "";

    history.forEach(function(item){

        let li =
        document.createElement(
        "li");

        li.innerHTML = item;

        list.appendChild(li);

    });

}

function logout(){

    localStorage.removeItem(
    "currentUser");

    window.location.href =
    "login.html";

}

</script>

</body>

</html>
