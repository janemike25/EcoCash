<!DOCTYPE html>
<html>

<head>

<title>EcoCash Dashboard</title>

<style>

body{

font-family:Arial,sans-serif;
background:#e8f5e9;
text-align:center;
margin-top:50px;

}

.card{

width:350px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px #bdbdbd;

}

h1{

color:#2e7d32;

}

input{

width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;

}

button{

padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
background:#2e7d32;
color:white;
cursor:pointer;

}

ul{

text-align:left;

}

</style>

</head>

<body>

<div class="card">

<h1 id="welcome"></h1>

<h2 id="balance"></h2>

<hr>

<h3>Send Money</h3>

<input
type="text"
id="recipient"
placeholder="Recipient Phone Number">

<input
type="number"
id="amount"
placeholder="Amount">

<br>

<button onclick="sendMoney()">

Send

</button>

<hr>

<h3>Take a Loan</h3>

<p>Maximum Loan: $3000</p>

<input
type="number"
id="loanAmount"
placeholder="Enter amount">

<br>

<button onclick="takeLoan()">

Take Loan

</button>

<hr>

<button onclick="logout()">

Logout

</button>

<hr>

<h3>Transaction History</h3>

<ul id="history"></ul>

</div>

<script>

let currentUser =
JSON.parse(
localStorage.getItem(
"currentUser"));

if(!currentUser){

window.location.href=
"login.html";

}

if(currentUser.balance == null){

currentUser.balance = 1250;

}

if(currentUser.history == null){

currentUser.history = [];

}

if(currentUser.loan == null){

currentUser.loan = 0;

}

document.getElementById(
"welcome").innerHTML=

"Welcome " +

currentUser.name;

document.getElementById(
"balance").innerHTML=

"Balance: $" +

currentUser.balance;

displayHistory();

function sendMoney(){

let recipientPhone =

document.getElementById(
"recipient").value;

let amount =

Number(
document.getElementById(
"amount").value);

let users =

JSON.parse(
localStorage.getItem(
"users")) || [];

let recipient =

users.find(

u =>

u.phone ===

recipientPhone

);

if(!recipient){

alert(

"Recipient not found"

);

return;

}

if(amount<=0){

alert(

"Enter valid amount"

);

return;

}

if(amount>

currentUser.balance){

alert(

"Insufficient balance"

);

return;

}

currentUser.balance -= amount;

recipient.balance += amount;

currentUser.history.push(

"Sent $" +

amount +

" to " +

recipientPhone

);

recipient.history.push(

"Received $" +

amount +

" from " +

currentUser.phone

);

saveUsers(
users,
recipient
);

alert(

"Money sent successfully!"

);

}

function takeLoan(){

let amount =

Number(

document.getElementById(
"loanAmount").value

);

if(amount<=0){

alert(

"Enter valid amount"

);

return;

}

if(

currentUser.loan +

amount >

3000

){

alert(

"Loan limit exceeded! Maximum is $3000"

);

return;

}

currentUser.loan += amount;

currentUser.balance += amount;

currentUser.history.push(

"Loan received $" +

amount

);

saveUsers();

alert(

"Loan approved!"

);

}

function saveUsers(
users=[],
recipient=null
){

let allUsers =

JSON.parse(

localStorage.getItem(
"users")

) || [];

allUsers = allUsers.map(

user => {

if(

user.phone ===

currentUser.phone

){

return currentUser;

}

if(

recipient &&

user.phone ===

recipient.phone

){

return recipient;

}

return user;

}

);

localStorage.setItem(

"users",

JSON.stringify(
allUsers)

);

localStorage.setItem(

"currentUser",

JSON.stringify(
currentUser)

);

document.getElementById(
"balance").innerHTML=

"Balance: $" +

currentUser.balance;

displayHistory();

}

function displayHistory(){

let list =

document.getElementById(
"history");

list.innerHTML="";

currentUser.history.forEach(

function(item){

let li =

document.createElement(
"li");

li.innerHTML=item;

list.appendChild(li);

});

}

function logout(){

localStorage.removeItem(
"currentUser");

window.location.href=
"login.html";

}

</script>

</body>

</html>
