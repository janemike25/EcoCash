<h1 id="welcome"></h1>

<p>
Phone Number:
<b id="phone"></b>
</p>

<h2>
Balance:
<span id="balance">$0</span>
</h2>

<script>

let currentUser =
JSON.parse(
localStorage.getItem("currentUser")
);

document.getElementById("welcome").innerHTML =
"Welcome " + currentUser.name;

document.getElementById("phone").innerHTML =
currentUser.phone;

document.getElementById("balance").innerHTML =
"$" + currentUser.balance;

</script>
