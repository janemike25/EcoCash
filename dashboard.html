<!DOCTYPE html>
<html>

<head>

    <title>EcoCash Dashboard</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            text-align:center;
            margin-top:60px;
        }

        .card{
            width:350px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px #ccc;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            padding:10px 20px;
            margin:5px;
            cursor:pointer;
        }

        #message{
            margin-top:10px;
        }

        ul{
            text-align:left;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>Welcome Jane</h1>

    <h2 id="balance">
        Balance: $1250
    </h2>

    <h3>Transfer Money</h3>

    <input
        type="text"
        id="recipient"
        placeholder="Recipient">

    <input
        type="number"
        id="amount"
        placeholder="Amount">

    <br>

    <button onclick="transfer()">
        Transfer
    </button>

    <hr>

    <h3>Withdraw Money</h3>

    <input
        type="number"
        id="withdrawAmount"
        placeholder="Amount to withdraw">

    <br>

    <button onclick="withdrawMoney()">
        Withdraw
    </button>

    <button onclick="logout()">
        Logout
    </button>

    <p id="message"></p>

    <hr>

    <h3>Transaction History</h3>

    <ul id="history"></ul>

</div>

<script>

let balance = 1250;

let history = [];

function transfer(){

    let recipient =
    document.getElementById(
    "recipient").value;

    let amount =
    Number(
    document.getElementById(
    "amount").value);

    if(recipient === "" || amount <= 0){

        message(
        "Enter recipient and amount.",
        "red");

        return;

    }

    if(amount > balance){

        message(
        "Insufficient balance.",
        "red");

        return;

    }

    balance -= amount;

    updateBalance();

    message(
    "Transferred $" +
    amount +
    " to " +
    recipient,
    "green");

    history.unshift(
    "Transferred $" +
    amount +
    " to " +
    recipient);

    displayHistory();

    document.getElementById(
    "recipient").value = "";

    document.getElementById(
    "amount").value = "";

}

function withdrawMoney(){

    let amount =
    Number(
    document.getElementById(
    "withdrawAmount").value);

    if(amount <= 0){

        message(
        "Enter a valid amount.",
        "red");

        return;

    }

    if(amount > balance){

        message(
        "Insufficient balance.",
        "red");

        return;

    }

    balance -= amount;

    updateBalance();

    message(
    "You withdrew $" +
    amount,
    "green");

    history.unshift(
    "Withdrew $" +
    amount);

    displayHistory();

    document.getElementById(
    "withdrawAmount").value = "";

}

function updateBalance(){

    document.getElementById(
    "balance").innerHTML =

    "Balance: $" + balance;

}

function displayHistory(){

    let list =
    document.getElementById(
    "history");

    list.innerHTML = "";

    history.forEach(function(item){

        let li =
        document.createElement("li");

        li.innerHTML = item;

        list.appendChild(li);

    });

}

function message(text,color){

    document.getElementById(
    "message").style.color =
    color;

    document.getElementById(
    "message").innerHTML =
    text;

}

function logout(){

    localStorage.removeItem(
    "currentUser");

    window.location.href =
    "login.html";

}

</script>

</body>

</html>
