<!DOCTYPE html>
<html>

<head>

    <title>EcoCash Dashboard</title>

    <style>

        body{

            font-family: Arial, sans-serif;
            background:#f5f5f5;
            text-align:center;
            margin-top:100px;

        }

        .card{

            width:320px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px #ccc;

        }

        button{

            padding:10px 20px;
            cursor:pointer;

        }

    </style>

</head>

<body>

<div class="card">

    <h1 id="welcome"></h1>

    <p>
        <b>Balance:</b> $1,250
    </p>

    <p>
        <b>Transactions:</b> 15
    </p>

    <button onclick="logout()">

        Logout

    </button>

</div>

<script>

let user = JSON.parse(
    localStorage.getItem("currentUser")
);

if(user){

    document.getElementById("welcome")
    .innerHTML =
    "Welcome " + user.name;

}

else{

    window.location.href =
    "login.html";

}

function logout(){

    localStorage.removeItem(
        "currentUser"
    );

    window.location.href =
    "login.html";

}

</script>

</body>

</html>
